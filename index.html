<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Placement website</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="navbar.css">
     <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: white;
    }

    .main-section {
      position: relative;
      
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 5%;
      color: white;
    }

    .content {
      background-color: rgba(0, 0, 0, 0.4);
      padding: 2rem;
      border-radius: 10px;
      max-width: 500px;
    }

    .content h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .content p {
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }

    .buttons {
      display: flex;
      gap: 1rem;
    }

    .buttons a {
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn-primary {
      background-color: #4f46e5;
      color: white;
    }

    .btn-secondary {
      background-color: white;
      color: #333;
    }

    @media screen and (max-width: 768px) {
      .content h1 {
        font-size: 2rem;
      }

      .content p {
        font-size: 1rem;
      }
    }
     body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }

    /* TOP FIXED IMAGE BANNER */
    .top-banner {
      width: 100%;
      height: 100px;
      text-align: center;
      color: blue;
      /* background-color: #0f0892; */
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      padding-left: 40px;
      color: white;
      font-size: 36px;
      font-weight: bold;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif  ;
    }
.text{
  color: blue;
  margin-left: 300px;
 
}
    /* SLIDER BELOW */
    .slider {
      width: 60%;
      height: 450px;
      margin: 30px auto;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .slider img {
      width: 100%;
      height: 450px;
      object-fit: cover;
    }
    /* BUTTONS */
    .prev, .next {
      position: absolute;
      top: 70%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
      font-size: 20px;
      border-radius: 5px;
    }

    .prev { left: 200px; }
    .next { right: 200px; }
    .content {
      padding: 20px;
      text-align: center;
    }

    .btn {
      padding: 10px 20px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
    }

    .btn:hover {
      background-color: #2980b9;
    }
    /* departments */
     .container {
            text-align: center;
            padding: 40px;
        }

        .container h1 {
            margin-bottom: 30px;
        }

        .departments {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .dept {
            background: #2c3e50;
            color: white;
            padding: 20px 30px;
            margin: 10px;
            border-radius: 8px;
            font-size: 18px;
            transition: 0.3s;
            cursor: pointer;
        }

        .dept:hover {
            background: #3498db;
            transform: scale(1.1);
        }
        .placement {
      width: 60%;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(2, 0, 0, 0.1);
    }
  </style>
</head>
<body>
  <!-- Include Navbar -->
  <div id="navbar-container"></div>
<div class="top-banner">
 <div class="text" style="text-align: center;"> Welcome to GEC Placement Cell</div>
   
</div>
<!-- CENTER IMAGE SLIDER -->
<div class="slider">
  <button class="prev" onclick="prevSlide()">❮</button>
  <img id="sliderImage" src=  "gec.jpg">
  <button class="next" onclick="nextSlide()">❯</button>
</div>
<div class="container">
        <h1>Our Departments</h1>

        <div class="departments">
            <div class="dept">Computer Science</div>
            <div class="dept">Information Technology</div>
            <div class="dept">Mechanical Engineering</div>
               <div class="dept">Information & Communication Technology</div>
            <div class="dept">Civil Engineering</div>
            <div class="dept">Electronics & Communication</div>
         
          
        </div>
    </div>
<div class="placement">
     <h2 style="text-align:center;">Placement Stats </h2>

     <canvas id="myChart"></canvas>

</div>


<script>
  const images = [
  
    "image4.png",
    "image5.png",
    "img10.jpeg",
    "img7.png",
    "img6.png",
    "gec.jpg",
    "img8.jpeg",
    "img9.jpeg",
   
  ];

  let index = 0;

  function showImage() {
    document.getElementById("sliderImage").src = images[index];
  }
 function nextSlide() {
    index = (index + 1) % images.length;
    showImage();
  }

  function prevSlide() {
    index = (index - 1 + images.length) % images.length;
    showImage();
  }

  // AUTO SLIDE
  setInterval(() => {
    nextSlide();
  }, 3000);
  
    // Load navbar
    fetch('navbar.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('navbar-container').innerHTML = data;
      });

fetch("get_stats.php")
.then(response => response.json())
.then(data => {

    new Chart(document.getElementById('myChart'), {
        type: 'bar',
        data: {
            labels: data.years,
            datasets: [
                {
                    label: 'Highest',
                    data: data.highest,
                    backgroundColor: 'green'
                },
                {
                    label: 'Average',
                    data: data.average,
                    backgroundColor: 'blue'
                }
            ]
        },
       options: {
    responsive: true,
    scales: {
        y: {
            beginAtZero: true,
            title: {
                display: true,
                text: 'Salary (LPA)'   // 👈 Y-axis title
            },
                        min: 1,        // 👈 start from 1
            max: 30,       
           ticks: {
                stepSize: 1   // 👈 1, 2, 3, 4...
            }
        }
    }
}
    });

});
      
  </script>
</body>
</html>
